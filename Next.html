<!DOCTYPE html>
<html>
<head>
<title></title>
<style type="text/css">
*{
  border:0px;
  padding:0px;
  box-sizing:border-box;
}
html{
overflow:hidden;
}
    body{
     background:rgb(0,0,145);
     height:100vh;
     width:100vw;
     padding:40px 30px;
     overflow:hidden;
    }
    div#main{

     border:1px solid white;
     overflow:scroll;
     box-shadow:inset 0px 0px 20px 0px black;
     
    }
    .new{
    animation:.9s 0s new linear infinite;
    opacity:0;
    display:inline;
    }
    input{
    height:30px;
    width:180px;
    padding:10px;
    display:block;
    text-transform:uppercase;
    }
    button{
    color:blue;
    font-weight:bold;
    justify-content:center;
    align-content:center;
    text-align:center;
    display:inline;
    border:2px solid blue;
    box-shadow:0px 0px 5px 0px black;
    padding:2px 5px;
    text-transform:capitalize;
    border-radius:6px;
    }
    #contents {
    letter-spacing:2px;
    }
    @keyframes new{
    0%{
    opacity:0;
    }
    49.9%{
    opacity:0;
    }
    50%{
    opacity:1;
    }
    80%{
    opacity:1;
    }
    80.1%{
    opacity:0;
    }
    }
</style>
</head>
<body>
<code>
  <div id="main" >
<span id="contents" >

</code>
</body>
